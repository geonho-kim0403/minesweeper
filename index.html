<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지뢰찾기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <div class="game-container">
            <h1>💣 지뢰찾기</h1>

            <div class="controls">
                <div class="difficulty-buttons">
                    <button class="diff-btn active" data-level="beginner">초급</button>
                    <button class="diff-btn" data-level="intermediate">중급</button>
                    <button class="diff-btn" data-level="expert">고급</button>
                    <button class="diff-btn hell" data-level="hell">🔥 지옥</button>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-item">
                    <span class="status-icon">💣</span>
                    <span id="mine-count">000</span>
                </div>
                <button id="reset-btn" class="reset-btn">😊</button>
                <div class="status-item">
                    <span class="status-icon">⏱️</span>
                    <span id="timer">000</span>
                </div>
            </div>

            <div id="board" class="board"></div>

            <p class="hint">좌클릭: 열기 · 우클릭: 깃발 표시</p>
        </div>

        <!-- 순위표 패널 -->
        <div class="leaderboard-panel">
            <h2>🏆 순위표</h2>
            <div class="leaderboard-tabs">
                <button class="lb-tab active" data-level="beginner">초급</button>
                <button class="lb-tab" data-level="intermediate">중급</button>
                <button class="lb-tab" data-level="expert">고급</button>
                <button class="lb-tab hell" data-level="hell">🔥</button>
            </div>
            <div class="leaderboard-periods">
                <button class="lb-period active" data-period="daily">일간</button>
                <button class="lb-period" data-period="weekly">주간</button>
            </div>
            <ol id="leaderboard-list" class="leaderboard-list"></ol>
            <p id="leaderboard-mode" class="leaderboard-mode"></p>
        </div>
    </div>

    <!-- 지뢰 폭발 연출 오버레이 -->
    <div id="explosion-overlay" class="explosion-overlay hidden">
        <img id="explosion-img" src="images/explosion.gif" alt="펑!">
        <div id="explosion-emoji" class="explosion-emoji">💥</div>
    </div>

    <!-- 시작 닉네임 입력 모달 (첫 진입 시) -->
    <div id="start-modal" class="modal-overlay">
        <div class="modal">
            <h3>💣 지뢰찾기</h3>
            <p>사용할 닉네임을 입력하세요.<br>기록이 순위표에 이 이름으로 남습니다.</p>
            <input type="text" id="start-name-input" maxlength="12" placeholder="닉네임 (최대 12자)" autocomplete="off">
            <div class="modal-buttons">
                <button id="start-confirm-btn" class="modal-btn primary">게임 시작</button>
            </div>
        </div>
    </div>

    <!-- 게임 결과 안내 모달 -->
    <div id="result-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3 id="result-title"></h3>
            <p id="result-text"></p>
            <div class="modal-buttons">
                <button id="result-retry-btn" class="modal-btn primary">다시 하기</button>
                <button id="result-close-btn" class="modal-btn">닫기</button>
            </div>
        </div>
    </div>

    <script src="leaderboard.js"></script>
    <script src="script.js"></script>
</body>
</html>
